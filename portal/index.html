<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Acesso ao Portal | CS São José</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: sans-serif; background: #003366; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 320px; }
        img { width: 100px; margin-bottom: 20px; }
        h2 { color: #003366; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 30px; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Portal do Aluno</h2>
    <p>Use seu e-mail cadastrado para acessar.</p>
    
    <div id="g_id_onload"
         data-client_id="1069428993928-li7i79sd5537v0gqolol4937p7vc3j5h.apps.googleusercontent.com"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
</div>

<script>
    async function handleCredentialResponse(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        const emailLogado = payload.email;

        try {
            const resposta = await fetch('/csaojose/acessos/acessocsaojoseareaaluno.json');
            const dados = await resposta.json();
            const aluno = dados.alunos.find(a => a.email === emailLogado);

            if (aluno) {
                sessionStorage.setItem("logado_csj", "true");
                sessionStorage.setItem("nome_aluno", aluno.nome);
                window.location.href = "/csaojose/areadoaluno";
            } else {
                alert("Acesso Negado: " + emailLogado + " não está na lista.");
            }
        } catch (e) {
            alert("Erro ao verificar lista de acesso.");
        }
    }
</script>

</body>
</html>
