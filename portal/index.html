<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Login | Colégio São José</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #003366; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 320px; }
        h2 { color: #003366; margin: 0 0 10px 0; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        #buttonDiv { display: flex; justify-content: center; cursor: pointer; transition: transform 0.2s; }
        #buttonDiv:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Portal do Aluno</h2>
    <p>Acesse com sua conta autorizada</p>
    
    <div id="buttonDiv">
        <img src="https://developers.google.com/static/identity/images/btn_google_signin_dark_normal_web.png" alt="Entrar com Google">
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCcnBwm2IwglxZE21fW-bjFKsknCXN4shg",
        authDomain: "csaojose.firebaseapp.com",
        projectId: "csaojose",
        storageBucket: "csaojose.firebasestorage.app",
        messagingSenderId: "220432678945",
        appId: "1:220432678945:web:808aad5fe6918f613e2360",
        measurementId: "G-NCET103BDJ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    async function handleLogin() {
        const provider = new GoogleAuthProvider();
        
        try {
            const result = await signInWithPopup(auth, provider);
            // Convertemos para minúsculas para evitar erro de busca
            const email = result.user.email.toLowerCase().trim();
            
            console.log("Tentando acesso para:", email);

            const docRef = doc(db, "usuarios_autorizados", email);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const dados = docSnap.data();
                console.log("Documento encontrado! Dados:", dados);

                if (dados.autorizado === true) {
                    sessionStorage.setItem("logado_csj", "true");
                    sessionStorage.setItem("nome_aluno", result.user.displayName);
                    
                    // Redirecionamento relativo para GitHub Pages
                    window.location.href = ".../areadoaluno";
                } else {
                    console.warn("Usuário existe mas campo 'autorizado' é false.");
                    alert("Acesso Negado: Sua conta está desativada.");
                    await auth.signOut();
                }
            } else {
                console.error("ERRO: O e-mail '" + email + "' não foi encontrado na coleção 'usuarios_autorizados'. Verifique se o ID do documento é o e-mail.");
                alert("Acesso Negado: E-mail não cadastrado.");
                await auth.signOut();
            }
        } catch (error) {
            console.error("Erro detalhado do Firebase:", error);
            alert("Falha na autenticação. Verifique sua conexão ou se o e-mail é válido.");
        }
    }

    document.getElementById("buttonDiv").addEventListener("click", handleLogin);
</script>

</body>
</html>
