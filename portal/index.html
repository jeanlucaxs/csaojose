<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Login | Colégio São José</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #003366; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 320px; }
        h2 { color: #003366; margin: 0 0 10px 0; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        #buttonDiv { display: flex; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Portal do Aluno</h2>
    <p>Acesse com sua conta autorizada</p>
    
    <div id="buttonDiv">
        <img src="https://developers.google.com/static/identity/images/btn_google_signin_dark_normal_web.png" alt="Entrar com Google">
    </div>
</div>

<script type="module">
    // 1. Importando SDKs do Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 2. Sua configuração do Firebase (obtida anteriormente)
    const firebaseConfig = {
        apiKey: "AIzaSyCcnBwm2IwglxZE21fW-bjFKsknCXN4shg",
        authDomain: "csaojose.firebaseapp.com",
        projectId: "csaojose",
        storageBucket: "csaojose.firebasestorage.app",
        messagingSenderId: "220432678945",
        appId: "1:220432678945:web:808aad5fe6918f613e2360",
        measurementId: "G-NCET103BDJ"
    };

    // Inicialização
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 3. Função de Login e Verificação
    async function handleLogin() {
        const provider = new GoogleAuthProvider();
        
        try {
            // Abre o popup do Google
            const result = await signInWithPopup(auth, provider);
            const email = result.user.email;

            // Busca o documento do aluno no Firestore
            // A coleção deve se chamar "usuarios_autorizados" e o ID do documento deve ser o e-mail
            const docRef = doc(db, "usuarios_autorizados", email);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists() && docSnap.data().autorizado === true) {
                // Se o e-mail estiver no Firestore e o campo 'autorizado' for true
                sessionStorage.setItem("logado_csj", "true");
                sessionStorage.setItem("nome_aluno", result.user.displayName);
                
                window.location.href = "/csaojose/areadoaluno";
            } else {
                // Se não estiver na lista ou 'autorizado' for false
                alert("Acesso Negado: O e-mail " + email + " não possui permissão de acesso.");
                await auth.signOut(); // Desloga para segurança
            }
        } catch (error) {
            console.error("Erro no login:", error);
            alert("Falha na autenticação. Tente novamente.");
        }
    }

    // 4. Ativa o clique no botão
    document.getElementById("buttonDiv").addEventListener("click", handleLogin);
</script>

</body>
</html>
