<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Login | Colégio São José</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #003366; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 320px; }
        h2 { color: #003366; margin: 0 0 10px 0; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        #buttonDiv { display: flex; justify-content: center; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Portal do Aluno</h2>
    <p>Acesse com sua conta autorizada</p>
    
    <div id="buttonDiv"></div>
</div>

<script>
    const CLIENT_ID = "1069428993928-li7i79sd5537v0gqolol4937p7vc3j5h.apps.googleusercontent.com";

    function handleCredentialResponse(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        
        // Busca o JSON de acessos
        fetch('/csaojose/acessos/acessocsaojoseareaaluno.json')
            .then(res => res.json())
            .then(dados => {
                const aluno = dados.alunos.find(a => a.email === payload.email);
                if (aluno) {
                    sessionStorage.setItem("logado_csj", "true");
                    sessionStorage.setItem("nome_aluno", aluno.nome);
                    window.location.href = "/csaojose/areadoaluno";
                } else {
                    alert("Acesso Negado para: " + payload.email);
                }
            })
            .catch(err => alert("Erro ao carregar lista de alunos. Verifique o arquivo JSON."));
    }

    window.onload = function () {
        google.accounts.id.initialize({
            client_id: CLIENT_ID,
            callback: handleCredentialResponse,
            ux_mode: "popup"
        });
        google.accounts.id.renderButton(
            document.getElementById("buttonDiv"),
            { theme: "outline", size: "large", width: 280, text: "signin_with" }
        );
    }
</script>
</body>
</html>
