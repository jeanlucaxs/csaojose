<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Aluno | CS São José</title>
    <script>
        if (sessionStorage.getItem("logado_csj") !== "true") {
            window.location.href = "/csaojose/index.html";
        }
    </script>
    <style>
        :root { --azul-marinho: #000080; --amarelo-ouro: #ffcc00; --branco: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--azul-marinho); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .user-bar { width: 100%; background: rgba(0, 0, 0, 0.2); padding: 10px 20px; display: flex; justify-content: flex-end; align-items: center; box-sizing: border-box; gap: 15px; }
        .btn-sair { background-color: #ff4d4d; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        .card-plataformas { background: white; color: #333; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; margin-top: 30px; }
        .card-plataformas h3 { color: var(--azul-marinho); border-bottom: 2px solid var(--amarelo-ouro); padding-bottom: 10px; }

        .container-botoes { display: grid; gap: 12px; margin-top: 20px; }
        .btn-link { display: block; padding: 12px; text-decoration: none; color: white; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        
        .coc { background-color: #ff6600; }
        .nave { background-color: #20c997; }
        .pleno { background-color: #6610f2; }
        .genio { background-color: #f1c40f; color: #333; }
        .maralto { background-color: #3498db; }
    </style>
</head>
<body>

    <div class="user-bar">
        <span>Aluno: <strong id="nome-aluno"></strong></span>
        <button class="btn-sair" onclick="sair()">SAIR</button>
    </div>

    <h1>Portal do Aluno</h1>

    <div class="card-plataformas">
        <h3>PLATAFORMAS DIGITAIS</h3>
        <div class="container-botoes">
            <a href="https://jornada.coc.com.br/painel/" target="_blank" class="btn-link coc">Apostila COC</a>
            <a href="https://portal.naveavela.com.br/home" target="_blank" class="btn-link nave">Nave a Vela</a>
            <a href="https://portal.programapleno.com.br/home" target="_blank" class="btn-link pleno">Programa Pleno</a>
            <a href="https://portal.geniodasfinancas.com.br/home" target="_blank" class="btn-link genio">Gênio das Finanças</a>
            <a href="https://portal.maralto.com.br/home" target="_blank" class="btn-link maralto">Portal Maralto</a>
        </div>
    </div>

    <script>
        document.getElementById("nome-aluno").innerText = sessionStorage.getItem("nome_aluno");
        function sair() {
            sessionStorage.clear();
            window.location.href = "/csaojose/index.html";
        }
    </script>
</body>
</html>
