<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Aluno | CS São José</title>
    
    <script>
        // SEGURANÇA: Bloqueia acesso sem login
        if (sessionStorage.getItem("logado_csj") !== "true") {
            window.location.href = "/csaojose/index.html";
        }

        // FUNÇÃO DE REDIRECIONAMENTO DIRETO
        function irPara(url) {
            // Limpa a sessão antes de sair para não deixar rastro
            sessionStorage.clear();
            // Transforma a página atual no link de destino
            window.location.href = url;
        }
    </script>

    <style>
        :root {
            --azul-marinho: #000080;
            --amarelo-ouro: #ffcc00;
            --branco: #ffffff;
            --vermelho: #ff4d4d;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--azul-marinho);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 20px;
        }

        /* Barra Superior Responsiva */
        .user-bar {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .user-info { font-size: 0.9rem; font-weight: bold; }

        .btn-sair {
            background-color: var(--vermelho);
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        h1 { margin: 30px 0 10px 0; font-size: 1.8rem; text-align: center; }

        .card-plataformas {
            background: white;
            color: #333;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            margin: 20px 0;
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .card-plataformas h3 {
            margin-top: 0;
            color: var(--azul-marinho);
            border-bottom: 2px solid var(--amarelo-ouro);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .container-botoes { display: grid; grid-template-columns: 1fr; gap: 12px; }

        /* Botões de Acesso Direto */
        .btn-link {
            display: block;
            padding: 16px;
            border: none;
            color: white;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            font-family: inherit;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-link:active { transform: scale(0.96); filter: brightness(0.9); }

        /* Cores das Plataformas */
        .classapp { background-color: #00b0ff; }
        .coc { background-color: #ff6600; }
        .nave { background-color: #20c997; }
        .pleno { background-color: #6610f2; }
        .genio { background-color: #f1c40f; color: #333; }
        .maralto { background-color: #3498db; }

        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            .btn-link { padding: 14px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="user-bar">
        <span class="user-info">Aluno: <span id="nome-aluno"></span></span>
        <button class="btn-sair" onclick="sair()">SAIR</button>
    </div>

    <h1>Portal do Aluno</h1>

    <div class="card-plataformas">
        <h3>ACESSAR PLATAFORMA</h3>
        
        <div class="container-botoes">
            <button onclick="irPara('https://classapp.com.br/auth')" class="btn-link classapp">ClassApp</button>
            <button onclick="irPara('https://jornada.coc.com.br/painel/')" class="btn-link coc">Apostila COC</button>
            <button onclick="irPara('https://portal.naveavela.com.br/home')" class="btn-link nave">Nave a Vela</button>
            <button onclick="irPara('https://portal.programapleno.com.br/home')" class="btn-link pleno">Programa Pleno</button>
            <button onclick="irPara('https://portal.geniodasfinancas.com.br/home')" class="btn-link genio">Gênio das Finanças</button>
            <button onclick="irPara('https://portal.maralto.com.br/home')" class="btn-link maralto">Portal Maralto</button>
        </div>
    </div>

    <script>
        document.getElementById("nome-aluno").innerText = sessionStorage.getItem("nome_aluno");

        function sair() {
            sessionStorage.clear();
            window.location.href = "/csaojose/index.html";
        }
    </script>

</body>
</html>
