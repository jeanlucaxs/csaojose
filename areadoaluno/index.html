<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Aluno | CS São José</title>
    
    <style>
        :root {
            --azul-marinho: #000080;
            --amarelo-ouro: #ffcc00;
            --branco: #ffffff;
            --vermelho: #ff4d4d;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--azul-marinho);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 20px;
            visibility: hidden; /* Esconde a página até validar o login */
        }

        .user-bar {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .user-info { font-size: 0.9rem; font-weight: bold; }
        .turma-tag { color: var(--amarelo-ouro); margin-left: 5px; font-style: italic; }

        .btn-sair {
            background-color: var(--vermelho);
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        h1 { margin: 30px 0 10px 0; font-size: 1.8rem; text-align: center; }

        .card-plataformas {
            background: white;
            color: #333;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            margin: 20px 0;
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .card-plataformas h3 {
            margin-top: 0;
            color: var(--azul-marinho);
            border-bottom: 2px solid var(--amarelo-ouro);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .container-botoes { display: grid; grid-template-columns: 1fr; gap: 12px; }

        .btn-link {
            display: block;
            padding: 16px;
            border: none;
            color: white;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            text-decoration: none;
        }

        .classapp { background-color: #00b0ff; }
        .coc { background-color: #ff6600; }
        .nave { background-color: #20c997; }
        .pleno { background-color: #6610f2; }
        .genio { background-color: #f1c40f; color: #333; }
        .maralto { background-color: #3498db; }

        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="user-bar">
        <span class="user-info">
            Aluno: <span id="nome-exibicao">Carregando...</span> 
            <span id="turma-exibicao" class="turma-tag"></span>
        </span>
        <button class="btn-sair" id="btn-logout">SAIR</button>
    </div>

    <h1>Portal do Aluno</h1>

    <div class="card-plataformas">
        <h3>ACESSAR PLATAFORMA</h3>
        <div class="container-botoes">
            <a href="https://classapp.com.br/auth" target="_blank" class="btn-link classapp">ClassApp</a>
            <a href="https://jornada.coc.com.br/painel/" target="_blank" class="btn-link coc">Apostila COC</a>
            <a href="https://portal.naveavela.com.br/home" target="_blank" class="btn-link nave">Nave a Vela</a>
            <a href="https://portal.programapleno.com.br/home" target="_blank" class="btn-link pleno">Programa Pleno</a>
            <a href="https://portal.geniodasfinancas.com.br/home" target="_blank" class="btn-link genio">Gênio das Finanças</a>
            <a href="https://portal.maralto.com.br/home" target="_blank" class="btn-link maralto">Portal Maralto</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcnBwm2IwglxZE21fW-bjFKsknCXN4shg",
            authDomain: "csaojose.firebaseapp.com",
            projectId: "csaojose",
            storageBucket: "csaojose.firebasestorage.app",
            messagingSenderId: "220432678945",
            appId: "1:220432678945:web:808aad5fe6918f613e2360"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // PROTEÇÃO REAL: Verifica se o usuário está logado no Firebase, não apenas no SessionStorage
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const email = user.email.toLowerCase();
                const docRef = doc(db, "usuarios_autorizados", email);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists() && docSnap.data().autorizado === true) {
                    // Pega o nome e turma que VOCÊ editou no Firebase
                    const dados = docSnap.data();
                    document.getElementById("nome-exibicao").innerText = dados.nome || user.displayName;
                    document.getElementById("turma-exibicao").innerText = dados.turma ? "| " + dados.turma : "";
                    
                    // Só mostra a página após confirmar tudo
                    document.body.style.visibility = "visible";
                } else {
                    alert("Acesso não autorizado no banco de dados.");
                    fazerLogout();
                }
            } else {
                window.location.href = "../portal/index.html";
            }
        });

        async function fazerLogout() {
            sessionStorage.clear();
            await signOut(auth);
            window.location.href = "../portal/index.html";
        }

        document.getElementById("btn-logout").addEventListener("click", fazerLogout);
    </script>
</body>
</html>
