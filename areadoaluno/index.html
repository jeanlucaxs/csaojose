<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Aluno | CS São José</title>
    
    <script>
        // SEGURANÇA: Bloqueia acesso sem login
        if (sessionStorage.getItem("logado_csj") !== "true") {
            window.location.href = "/csaojose/index.html";
        }
    </script>

    <style>
        :root {
            --azul-marinho: #000080;
            --amarelo-ouro: #ffcc00;
            --branco: #ffffff;
            --vermelho: #ff4d4d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--azul-marinho);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Barra de Usuário - Responsiva */
        .user-bar {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .user-info { font-size: 0.9rem; font-weight: bold; }

        .btn-sair {
            background-color: var(--vermelho);
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        h1 {
            margin: 30px 0 10px 0;
            font-size: 2rem;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        /* Card Central - Responsivo */
        .card-plataformas {
            background: white;
            color: #333;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
            margin: 20px 0;
            box-sizing: border-box;
        }

        .card-plataformas h3 {
            margin-top: 0;
            color: var(--azul-marinho);
            border-bottom: 2px solid var(--amarelo-ouro);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .container-botoes {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        /* Botões de Link */
        .btn-link {
            display: block;
            padding: 14px;
            text-decoration: none;
            color: white;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            transition: transform 0.2s, filter 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-link:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        /* Cores Oficiais das Plataformas */
        .classapp { background-color: #00b0ff; } /* Azul ClassApp */
        .coc { background-color: #ff6600; }
        .nave { background-color: #20c997; }
        .pleno { background-color: #6610f2; }
        .genio { background-color: #f1c40f; color: #333; }
        .maralto { background-color: #3498db; }

        /* Ajustes extras para telas muito pequenas */
        @media (max-width: 360px) {
            h1 { font-size: 1.5rem; }
            .user-info { font-size: 0.8rem; }
            .btn-link { padding: 12px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="user-bar">
        <span class="user-info">Olá, <span id="nome-aluno">Aluno</span></span>
        <button class="btn-sair" onclick="sair()">SAIR</button>
    </div>

    <h1>Área do Aluno</h1>

    <div class="card-plataformas">
        <h3>PLATAFORMAS DIGITAIS</h3>
        
        <div class="container-botoes">
            <a href="https://classapp.com.br/auth" target="_blank" class="btn-link classapp">ClassApp (Comunicação)</a>
            
            <a href="https://jornada.coc.com.br/painel/" target="_blank" class="btn-link coc">Apostila COC</a>
            <a href="https://portal.naveavela.com.br/home" target="_blank" class="btn-link nave">Nave a Vela</a>
            <a href="https://portal.programapleno.com.br/home" target="_blank" class="btn-link pleno">Programa Pleno</a>
            <a href="https://portal.geniodasfinancas.com.br/home" target="_blank" class="btn-link genio">Gênio das Finanças</a>
            <a href="https://portal.maralto.com.br/home" target="_blank" class="btn-link maralto">Portal Maralto</a>
        </div>
    </div>

    <script>
        // Recupera o nome do aluno salvo no login
        const nome = sessionStorage.getItem("nome_aluno");
        if (nome) {
            document.getElementById("nome-aluno").innerText = nome;
        }

        function sair() {
            sessionStorage.clear();
            window.location.href = "/csaojose/index.html";
        }
    </script>

</body>
</html>
