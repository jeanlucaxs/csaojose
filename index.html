<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colégio São José - Prudentópolis</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --azul-escuro: #003366; --amarelo-ouro: #ffcc00; --branco: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; line-height: 1.6; }
        .top-nav { background: var(--azul-escuro); padding: 10px 0; text-align: center; }
        .top-nav a { margin: 0 15px; text-decoration: none; color: white; font-weight: 500; font-size: 14px; }
        header { background-color: var(--branco); color: var(--azul-escuro); padding: 30px 20px; text-align: center; border-bottom: 3px solid var(--amarelo-ouro); }
        .btn-aluno { background: var(--amarelo-ouro); color: var(--azul-escuro) !important; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; border: none; }
        .hero { background: linear-gradient(rgba(0,51,102,0.8), rgba(0,51,102,0.8)), url('https://via.placeholder.com/1200x400'); background-size: cover; color: white; padding: 80px 20px; text-align: center; }
    </style>
</head>
<body>

<nav class="top-nav">
    <a href="index.html">INÍCIO</a>
    <a href="#quem-somos">QUEM SOMOS</a>
    <button onclick="abrirLogin()" class="btn-aluno">PORTAL DO ALUNO</button>
</nav>

<header>
    <h1>Colégio São José</h1>
    <p>Prudentópolis - PR</p>
</header>

<section class="hero">
    <h2>Tradição e Tecnologia</h2>
    <p>Educação que transforma gerações.</p>
</section>

<script>
    const CLIENT_ID = "1069428993928-li7i79sd5537v0gqolol4937p7vc3j5h.apps.googleusercontent.com";
    
    // LISTA DE ACESSO: Adicione os e-mails aqui
    const EMAILS_PERMITIDOS = ["seu-email@gmail.com", "jeanlucaxs@gmail.com"];

    function abrirLogin() {
        google.accounts.id.initialize({
            client_id: CLIENT_ID,
            callback: handleCredentialResponse
        });
        google.accounts.id.prompt(); 
    }

    function handleCredentialResponse(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        
        if (EMAILS_PERMITIDOS.includes(payload.email)) {
            // Cria a "chave" na sessão do navegador
            sessionStorage.setItem("logado_csj", "true");
            sessionStorage.setItem("nome_aluno", payload.name);
            // Redireciona para a pasta correta
            window.location.href = "/csaojose/areadoaluno";
        } else {
            alert("Acesso Negado: O e-mail " + payload.email + " não está na lista de alunos.");
        }
    }
</script>

</body>
</html>
